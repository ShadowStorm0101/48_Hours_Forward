{% extends "base.html"%}

{% block head %}
<link rel="stylesheet" href="../static/map.css">
{% endblock %}

{% block title %}Map{% endblock %}

{% block content %}
<h1>Map Page</h1>

<div id="flex_div">
  <div id="map_div">
      <div id="map"></div>
      <button onclick="recenter()">Recenter</button>
      <button onclick="searchArea()">Search this area</button>
  </div>

  <div id="services_frame">
      <h3 id="services_header">Nearby Addiction Services</h3>
      {% for place in places %}
      <button class="services_button"
          onclick="focusPlace({{ place.lat }}, {{ place.lng }})">

        <div class="services-left">
            <strong>{{ place.name }}</strong><br>
        </div>

        <div class="services-right">
            {{ "%.2f"|format(place.distance_km) }} km<br>
            <div class="services-addiction-type">
                {% if place.is_alcohol %} 🍺 {% endif %}
            {% if place.is_narcotics %} 💊 {% endif %}
            {% if place.is_nicotine %} 🚬 {% endif %}
            </div>
        </div>

      </button>
      {% endfor %}
  </div>
</div>

<style>
</style>

<script src="https://maps.googleapis.com/maps/api/js?key={{ maps_api_key }}"></script>

<script>
const places = {{ places | tojson }};

let map;
let markers = [];
let centerMarker = null;

function initMap(centerLat, centerLng, zoom = 12) {
    map = new google.maps.Map(document.getElementById("map"), {
        zoom: zoom,
        streetViewControl: false,
        mapTypeControl: false,
        center: { lat: centerLat, lng: centerLng }
    });

    places.forEach(place => {
        const marker = new google.maps.Marker({
            position: { lat: place.lat, lng: place.lng },
            map: map,
            title: place.name,
        });

        const info = new google.maps.InfoWindow({
            content: `<strong>${place.name}</strong>`
        });

        marker.addListener("click", () => info.open(map, marker));
        markers.push(marker);
    });

    updateCenterMarker();
}

function updateCenterMarker() {
    if (!map) return;

    const center = map.getCenter();

    // remove old marker
    if (centerMarker) {
        centerMarker.setMap(null);
    }

    centerMarker = new google.maps.Marker({
        position: center,
        map: map,
        title: "Search Center",
        icon: {
            url: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
        }
    });
}

function focusPlace(lat, lng) {
    map.panTo({ lat, lng });
    map.setZoom(14);
}

function loadMap() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                window.location.href = `/map?lat=${lat}&lng=${lng}`;
            },
            () => initMap(54.9783, -1.6178) //newcastle city centre fall back
        );
    } else {
        initMap(54.9783, -1.6178); //newcastle city centre fall back
    }
}

function searchArea(){
    if (!map) return;

    const center = map.getCenter();
    const lat = center.lat();
    const lng = center.lng();
    const zoom = map.getZoom();

    // reload page with new coords
    window.location.href = `/map?lat=${lat}&lng=${lng}&zoom=${zoom}`;
}

function recenter(){
    if (!map || !centerMarker) return;

    const pos = centerMarker.getPosition(); // google.maps.LatLng
    map.panTo(pos);
}

const urlParams = new URLSearchParams(window.location.search);

if (urlParams.has("lat") && urlParams.has("lng")) {
    const lat = parseFloat(urlParams.get("lat"));
    const lng = parseFloat(urlParams.get("lng"));
    const zoom = parseInt(urlParams.get("zoom")) || 12;
    initMap(lat, lng, zoom);
} else {
    loadMap(); // fallback to geolocation
}
</script>
{% endblock %}
