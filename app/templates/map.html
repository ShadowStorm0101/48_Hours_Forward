{% extends "base.html" %}

{% block title %}Map{% endblock %}

{% block content %}
<h1>Map Page</h1>

<iframe
  id="mapFrame"
  width="800"
  height="500"
  style="border:0"
  loading="lazy"
  allowfullscreen
  referrerpolicy="no-referrer-when-downgrade">
</iframe>

<script>
function initMapWithUserLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                const mapSrc = `https://www.google.com/maps/embed/v1/view?key={{ maps_api_key }}&center=${lat},${lng}&zoom=12`;

                document.getElementById("mapFrame").src = mapSrc;
            },
            function(error) {
                console.log("Location access denied or unavailable.");
                // fallback location
                document.getElementById("mapFrame").src =
                    "https://www.google.com/maps/embed/v1/place?key={{ maps_api_key }}&q=Newcastle";
            }
        );
    } else {
        console.log("Geolocation not supported.");
    }
}

initMapWithUserLocation();
</script>
{% endblock %}
