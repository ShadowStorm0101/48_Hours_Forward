{% extends "base.html" %}

{% block title %}Map{% endblock %}

{% block content %}
<h1>Map Page</h1>

<div style="display: flex; gap: 20px; height: 500px;">
  <div style="flex: 3;">
      <div id="map" style="width:100%; height:100%;"></div>
  </div>

<script src="https://maps.googleapis.com/maps/api/js?key={{ maps_api_key }}"></script>

<script>
const places = {{ places | tojson }};

let map;
let markers = [];

function initMap(centerLat, centerLng) {
    map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: { lat: centerLat, lng: centerLng }
    });

    places.forEach(place => {
        const marker = new google.maps.Marker({
            position: { lat: place.lat, lng: place.lng },
            map: map,
            title: place.name
        });

        const info = new google.maps.InfoWindow({
            content: `<strong>${place.name}</strong><br>${place.description || ""}`
        });

        marker.addListener("click", () => info.open(map, marker));
        markers.push(marker);
    });
}

function focusPlace(lat, lng) {
    map.panTo({ lat, lng });
    map.setZoom(14);
}

function loadMap() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => initMap(pos.coords.latitude, pos.coords.longitude),
            () => initMap(54.9783, -1.6178)
        );
    } else {
        initMap(54.9783, -1.6178);
    }
}

loadMap();
</script>

<div style="flex: 1; overflow-y: auto; border: 1px solid #ccc; padding: 10px; align-items: center; ">
    <h3>Nearby Addiction Services</h3>
        {% for place in places %}
        <button
            onclick="focusPlace({{ place.lat }}, {{ place.lng }})"
            style="width: 100%; height: 50px; margin-bottom: 8px;">
            {{ place.name }}
        </button>
    {% endfor %}
 </div>
</div>
{% endblock %}
